name: kimkayfx_signals
description: KimKayFX Academy Trading Signals App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_messaging: ^14.7.0  # ✅ This handles push notifications
  url_launcher: ^6.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/logos/kimkay_logo.png
    - assets/images/logos/ecocash_logo.png
    - assets/images/logos/innbucks_logo.png
    - assets/images/logos/omari_logo.png

